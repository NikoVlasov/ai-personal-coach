<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness AI</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; }
h2 { margin-top: 20px; }
input, select { display: block; margin: 10px 0; padding: 5px; width: 100%; }
button { padding: 10px; margin: 5px 0; width: 100%; }
#workoutContainer div { margin: 5px 0; padding: 5px; background: #f0f0f0; }
#aiAdvice { background: #e0ffe0; padding: 10px; margin: 10px 0; }
.hidden { display: none; }
</style>
</head>
<body>

<!-- TABS -->
<div id="registerTab">
  <h2>Register</h2>
  <input type="email" id="registerEmail" placeholder="Email">
  <input type="password" id="registerPassword" placeholder="Password">
  <input type="number" id="age" placeholder="Age">
  <input type="number" id="height" placeholder="Height (cm)">
  <input type="number" id="weight" placeholder="Weight (kg)">
  <select id="goal">
    <option value="">Select goal</option>
    <option value="fat_loss">Fat Loss</option>
    <option value="strength">Strength</option>
    <option value="maintain">Maintain</option>
  </select>
  <select id="level">
    <option value="">Select level</option>
    <option value="beginner">Beginner</option>
    <option value="intermediate">Intermediate</option>
    <option value="advanced">Advanced</option>
  </select>
  <button onclick="register()">Register</button>
  <p id="registerMessage"></p>
  <button onclick="showTab('login')">Already have an account? Login</button>
</div>

<div id="loginTab" class="hidden">
  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<div id="mainApp" class="hidden">
  <h2>Main App</h2>

  <h3>Daily Check-in</h3>
  <input type="number" id="energy" placeholder="Energy (1-10)">
  <input type="number" id="soreness" placeholder="Soreness (1-10)">
  <input type="number" id="mood" placeholder="Mood (1-10)">
  <button onclick="submitCheckin()">Submit Check-in</button>
  <p id="checkinMessage"></p>

  <h3>Workout</h3>
  <button onclick="generateWorkout()">Generate Workout</button>
  <div id="workoutContainer"></div>
  <button onclick="completeWorkout()">Complete Workout</button>
  <p id="workoutMessage"></p>

  <h3>Status</h3>
  <div id="statusContainer"></div>

  <h3>AI Advice</h3>
  <div id="aiAdvice"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>
let token = null;

// TAB SWITCHING
function showTab(tab) {
    document.getElementById("registerTab").classList.toggle('hidden', tab !== "register");
    document.getElementById("loginTab").classList.toggle('hidden', tab !== "login");
    document.getElementById("mainApp").classList.toggle('hidden', tab !== "app");
}

// REGISTER
async function register() {
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;
    const age = parseInt(document.getElementById("age").value);
    const height = parseInt(document.getElementById("height").value);
    const weight = parseInt(document.getElementById("weight").value);
    const goal = document.getElementById("goal").value;
    const level = document.getElementById("level").value;

    if(!email || !password || !age || !height || !weight || !goal || !level){
        document.getElementById("registerMessage").innerText = "Fill all fields";
        return;
    }

    const res = await fetch("/register", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
    });

    const data = await res.json();
    if(res.ok){
        // TODO: save additional profile to backend
        document.getElementById("registerMessage").innerText = "Registered! You can login.";
        showTab("login");
    } else {
        document.getElementById("registerMessage").innerText = data.detail || "Error";
    }
}

// LOGIN
async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const res = await fetch("/login", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
    });
    const data = await res.json();
    if(res.ok){
        token = data.access_token;
        showTab("app");
        getStatus();
    } else {
        document.getElementById("loginMessage").innerText = data.detail || "Error";
    }
}

// CHECKIN
async function submitCheckin() {
    const energy = parseInt(document.getElementById("energy").value);
    const soreness = parseInt(document.getElementById("soreness").value);
    const mood = parseInt(document.getElementById("mood").value);
    const res = await fetch("/checkin", {
        method: "POST",
        headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
        body: JSON.stringify({energy, soreness, mood})
    });
    const data = await res.json();
    document.getElementById("checkinMessage").innerText = data.status;

    if(res.ok){
        generateWorkout();
    }
}

// GENERATE WORKOUT
async function generateWorkout() {
    const res = await fetch("/workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    const container = document.getElementById("workoutContainer");
    container.innerHTML = "";
    data.workout.forEach(w => {
        container.innerHTML += `<div class="workout">${w.name} ${w.reps || w.duration || ""}</div>`;
    });

    // AI advice
    document.getElementById("aiAdvice").innerText = data.advice || "Follow this workout for today. Keep consistency!";
}

// COMPLETE WORKOUT
async function completeWorkout() {
    const res = await fetch("/complete-workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("workoutMessage").innerText = data.status === "ok" ? `Workout done! Streak: ${data.streak}` : "Already completed today";
    getStatus();
}

// GET STATUS
async function getStatus() {
    const res = await fetch("/status", {
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("statusContainer").innerText = `Streak: ${data.streak}, Total workouts: ${data.total}`;
}

// LOGOUT
function logout() {
    token = null;
    showTab("login");
}

// INITIAL
showTab("register");
</script>
</body>
</html>
