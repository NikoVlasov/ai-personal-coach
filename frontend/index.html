<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness App MVP</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
  .container { max-width: 400px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
  h2 { text-align: center; }
  input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
  button { width: 100%; padding: 10px; margin: 10px 0; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #0056b3; }
  .link { color: #007bff; cursor: pointer; text-decoration: underline; font-size: 0.9em; display: block; text-align: center; margin-top: 5px;}
  #mainApp { display: none; }
  .workout { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
</style>
</head>
<body>
<div class="container">

  <!-- REGISTER -->
  <div id="registerTab">
    <h2>Register</h2>
    <input type="email" id="registerEmail" placeholder="Email">
    <input type="password" id="registerPassword" placeholder="Password">
    <button onclick="register()">Register</button>
    <span class="link" onclick="showTab('login')">Already have an account? Login</span>
    <div id="registerMessage"></div>
  </div>

  <!-- LOGIN -->
  <div id="loginTab" style="display:none;">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <span class="link" onclick="showTab('register')">No account? Register</span>
    <div id="loginMessage"></div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp">
    <h2>Fitness App</h2>

    <h3>Daily Check-in</h3>
    <input type="number" id="energy" placeholder="Energy 1-10" min="1" max="10">
    <input type="number" id="soreness" placeholder="Soreness 1-10" min="1" max="10">
    <input type="number" id="mood" placeholder="Mood 1-10" min="1" max="10">
    <button onclick="submitCheckin()">Submit Check-in</button>
    <div id="checkinMessage"></div>

    <h3>Workout</h3>
    <button onclick="generateWorkout()">Generate Workout</button>
    <div id="workoutContainer"></div>
    <button onclick="completeWorkout()">Complete Workout</button>
    <div id="workoutMessage"></div>

    <h3>Status</h3>
    <button onclick="getStatus()">Refresh Status</button>
    <div id="statusContainer"></div>

    <button onclick="logout()" style="background:#dc3545;">Logout</button>
  </div>

</div>

<script>
let token = null;

// TAB SWITCHING
function showTab(tab) {
    document.getElementById("registerTab").style.display = tab === "register" ? "block" : "none";
    document.getElementById("loginTab").style.display = tab === "login" ? "block" : "none";
    document.getElementById("mainApp").style.display = tab === "app" ? "block" : "none";
}

// REGISTER
async function register() {
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;
    const res = await fetch("/register", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
    });
    const data = await res.json();
    if(res.ok){
        document.getElementById("registerMessage").innerText = "Registered! You can login.";
        showTab("login");
    } else {
        document.getElementById("registerMessage").innerText = data.detail || "Error";
    }
}

// LOGIN
async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const res = await fetch("/login", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
    });
    const data = await res.json();
    if(res.ok){
        token = data.access_token;
        showTab("app");
        getStatus();
    } else {
        document.getElementById("loginMessage").innerText = data.detail || "Error";
    }
}

// CHECKIN
async function submitCheckin() {
    const energy = parseInt(document.getElementById("energy").value);
    const soreness = parseInt(document.getElementById("soreness").value);
    const mood = parseInt(document.getElementById("mood").value);
    const res = await fetch("/checkin", {
        method: "POST",
        headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
        body: JSON.stringify({energy, soreness, mood})
    });
    const data = await res.json();
    document.getElementById("checkinMessage").innerText = data.status;
}

// GENERATE WORKOUT
async function generateWorkout() {
    const res = await fetch("/workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    const container = document.getElementById("workoutContainer");
    container.innerHTML = "";
    data.workout.forEach(w => {
        container.innerHTML += `<div class="workout">${w.name} ${w.reps || w.duration || ""}</div>`;
    });
}

// COMPLETE WORKOUT
async function completeWorkout() {
    const res = await fetch("/complete-workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("workoutMessage").innerText = data.status === "ok" ? `Workout done! Streak: ${data.streak}` : "Already completed today";
    getStatus();
}

// GET STATUS
async function getStatus() {
    const res = await fetch("/status", {
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("statusContainer").innerText = `Streak: ${data.streak}, Total workouts: ${data.total}`;
}

// LOGOUT
function logout() {
    token = null;
    showTab("login");
}
</script>
</body>
</html>
