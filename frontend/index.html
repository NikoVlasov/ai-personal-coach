<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentra Coach</title>
<style>
/* =================================================== */
/*     AI COACH — ARCHITECTURE + FUTURISTIC DESIGN    */
/* =================================================== */


/* ============================= */
/* DESIGN SYSTEM (из второго)   */
/* ============================= */

:root {
  --bg-main:        #f5f9ff;
  --bg-chat:        #e8f0ff;
  --bg-message-user: #5a8cff;
  --bg-message-ai:  #ffffff;
  --accent:         #5a8cff;
  --accent-dark:    #3b6ae0;
  --text-main:      #1a2b4c;
  --text-secondary: #5a6f8c;
  --border:         rgba(90, 140, 255, 0.15);
  --shadow-sm:      0 4px 12px rgba(90, 140, 255, 0.08);
  --shadow-md:      0 8px 24px rgba(90, 140, 255, 0.12);
  --radius:         14px;
  --transition:     all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-main:        #0f172a;
  --bg-chat:        #1e293b;
  --bg-message-user: #1e40af;
  --bg-message-ai:  #1e293b;
  --text-main:      #e2e8f0;
  --text-secondary: #94a3b8;
  --border:         rgba(90, 140, 255, 0.25);
  --shadow-sm:      0 4px 12px rgba(0,0,0,0.4);
  --shadow-md:      0 8px 24px rgba(0,0,0,0.5);
}


/* ============================= */
/* RESET                         */
/* ============================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}


/* ============================= */
/* BODY — архитектура сохранена */
/* ============================= */

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-main);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


/* ============================= */
/* APP CONTAINER (архитектура)  */
/* ============================= */

#app-container {
  width: 420px;
  max-width: 100%;
  min-height: 700px;          /* не меняем как ты просил */
  background: var(--bg-main);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--border);
}

.hidden { display: none; }


/* ============================= */
/* HEADER                        */
/* ============================= */

.app-header {
  background: var(--bg-chat);
  color: var(--text-main);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 1.25rem;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}

.logout-text {
  cursor: pointer;
  font-size: 0.85em;
  padding: 6px 10px;
  border-radius: 8px;
  color: var(--text-secondary);
  transition: var(--transition);
}

.logout-text:hover {
  background: rgba(90,140,255,0.08);
  color: var(--text-main);
}


/* ============================= */
/* AUTH                          */
/* ============================= */

#auth-container {
  padding: 20px;
  display:flex;
  flex-direction: column;
  align-items: center;
}

/* ============================= */
/* AUTH FIX — Tabs Work Properly */
/* ============================= */

.auth-tabs {
  display: flex;
  width: 100%;
  border-radius: var(--radius);
  overflow: hidden;
  background: rgba(90, 140, 255, 0.08);
  box-shadow: var(--shadow-sm);
  margin-bottom: 18px;
}

.auth-tabs button {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}

.auth-tabs button.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: white;
}

.auth-form {
  display: flex; /* 🔥 важно */
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.hidden {
  display: none !important; /* 🔥 показываем только активную */
}

.auth-form input {
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: var(--text-main);
  transition: var(--transition);
}

.auth-form input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(90,140,255,0.15);
}

.auth-form button {
  padding: 12px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.auth-form button:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(90,140,255,0.25);
}


/* ============================= */
/* CHAT DROPDOWN (архитектура сохранена) */
/* ============================= */

#chat-dropdown-container {
  position: relative;
  margin: 15px 10px 10px 10px;
}

#chat-dropdown-btn {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-chat);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}

#chat-dropdown-btn:hover {
  border-color: var(--accent);
}

#chat-list {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  max-height: 0;
  overflow: hidden;
  background: var(--bg-chat);
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
  opacity: 0;
  z-index: 100;
}

#chat-list.show {
  max-height: 200px;
  overflow-y:auto;
  opacity: 1;
}

#chat-list div {
  padding: 10px 14px;
  cursor: pointer;
  transition: var(--transition);
}

#chat-list div:hover {
  background: rgba(90,140,255,0.08);
}
#new-chat-title {
  flex: 1;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-chat);
  font-size: 14.5px;
  transition: var(--transition);
  min-width: 0;
}

#new-chat-title:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(90,140,255,0.15);
}

/* ============================= */
/* CHAT CONTAINER (архитектура сохранена) */
/* ============================= */

#chat-container {
  flex: 1;
  padding: 12px 16px;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg-chat);
  max-height: 400px;  /* оставлено */
}
/* ============================= */
/* NEW CHAT CONTAINER FIX */
/* ============================= */

#new-chat-container {
  display: flex;
  gap: 8px;
  margin: 0 10px 10px 10px;   /* такие же отступы как у dropdown */
}

#new-chat-title {
  flex: 1;                    /* занимает всё доступное место */
}

/* ============================= */
/* MESSAGES                     */
/* ============================= */

.message {
  max-width: 75%;
  padding: 14px 18px;
  border-radius: 18px;
  line-height: 1.6;
  font-size: 14.5px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  animation: fadeIn 0.3s ease;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.user {
  background: var(--bg-message-user);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.ai {
  background: var(--bg-message-ai);
  color: var(--text-main);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}


/* ============================= */
/* INPUT AREA (архитектура сохранена) */
/* ============================= */

#input-container {
  display:flex;
  gap:8px;
  padding:12px;
}

#message-input {
  flex:1;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-chat);
  transition: var(--transition);
}

#message-input:focus {
  outline:none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(90,140,255,0.15);
}

/* ============================= */
/* UNIFIED BUTTON SYSTEM */
/* ============================= */

#input-container button,
#new-chat-container button,
#delete-chat-btn {
  padding: 0 18px;
  min-width: 90px;
  height: 44px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

#input-container button:hover,
#new-chat-container button:hover,
#delete-chat-btn:hover {
  background: var(--accent-dark);
  transform: scale(1.05);
}

/* ============================= */
/* DELETE BUTTON — OVERRIDE */
/* ============================= */

#delete-chat-btn {
  background: linear-gradient(135deg, #b84a4a, #9f3b3b);
}

#delete-chat-btn:hover {
  background: linear-gradient(135deg, #a13f3f, #873232);
}

/* ============================= */
/* DELETE ALIGN FIX */
/* ============================= */

#delete-chat-btn {
  margin: 0 10px 12px 10px;
}

/* ============================= */
/* ANIMATIONS                   */
/* ============================= */

@keyframes fadeIn {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script>
marked.setOptions({
    gfm: true,
    breaks: true,
    mangle: false,
    headerIds: false
});
</script>


<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script>
marked.setOptions({
    gfm: true,
    breaks: true,
    mangle: false,
    headerIds: false
});
</script>
</head>
<body>
<div id="app-container">
    <header class="app-header">
        <div class="app-title">Mentra Coach</div>
        <span class="logout-text" id="btn-logout" onclick="mainModule.logout()">Logout</span>
    </header>

    <!-- AUTH -->
    <div id="auth-container">
        <div class="auth-tabs">
            <button id="login-tab" class="active" onclick="authModule.showForm('login')">Login</button>
            <button id="register-tab" onclick="authModule.showForm('register')">Register</button>
        </div>
        <form id="login-form" class="auth-form">
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="button" onclick="authModule.login()">Enter</button>
        </form>
        <form id="register-form" class="auth-form hidden">
            <input type="email" id="register-email" placeholder="Email" required>
            <input type="password" id="register-password" placeholder="Password" required>
            <button type="button" onclick="authModule.register()">Register</button>
        </form>
    </div>

    <!-- CHAT -->
    <div id="chat-ui" class="hidden">
        <div id="chat-dropdown-container">
            <div id="chat-dropdown-btn" onclick="toggleChatList()">Select chat</div>
            <div id="chat-list"></div>
        </div>

        <div id="new-chat-container">
            <input type="text" id="new-chat-title" placeholder="New chat title">
            <button onclick="chatModule.createChat()">Create</button>
        </div>

        <button id="delete-chat-btn" onclick="chatModule.deleteChat()">Delete chat</button>

        <div id="chat-container"></div>
        <div id="quick-buttons"></div>
</div>
</div>





<script>
////////////////////////////////////////////////////////////
// HELPERS
////////////////////////////////////////////////////////////

function toggleChatList() {
    const list = document.getElementById("chat-list");
    if (!list) return;

    list.classList.toggle("show");
}

function scrollToBottom() {
    const c = document.getElementById("chat-container");
    if (!c) return;
    c.scrollTop = c.scrollHeight;
}

function convertLinks(el) {
    const text = el.textContent;
    const urlRegex = /(https?:\/\/[^\s]+)/g;

    el.innerHTML = "";
    let lastIndex = 0, match;

    while ((match = urlRegex.exec(text)) !== null) {
        el.appendChild(document.createTextNode(text.substring(lastIndex, match.index)));

        const a = document.createElement("a");
        a.href = match[0];
        a.textContent = match[0];
        a.target = "_blank";

        el.appendChild(a);
        lastIndex = urlRegex.lastIndex;
    }

    el.appendChild(document.createTextNode(text.substring(lastIndex)));
}

////////////////////////////////////////////////////////////
// MAIN
////////////////////////////////////////////////////////////

const mainModule = (() => {
    let token = null;
    let chatId = null;

    return {
        setToken: t => token = t,
        getToken: () => token,

        setChatId: id => chatId = id,
        getChatId: () => chatId,

        logout: () => {
            localStorage.removeItem("token");

            token = null;
            chatId = null;

            document.getElementById("chat-container").innerHTML = "";
            document.getElementById("chat-ui").classList.add("hidden");
            document.getElementById("auth-container").style.display = "block";
        }
    };
})();

////////////////////////////////////////////////////////////
// AUTH
////////////////////////////////////////////////////////////

const authModule = (() => {

function showForm(type) {
    document.getElementById("login-form").classList.toggle("hidden", type !== "login");
    document.getElementById("register-form").classList.toggle("hidden", type !== "register");

    document.getElementById("login-tab").classList.toggle("active", type === "login");
    document.getElementById("register-tab").classList.toggle("active", type === "register");
}

async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
    });

    if (!res.ok) {
        alert("Login failed");
        return;
    }

    const data = await res.json();

    mainModule.setToken(data.access_token);
    localStorage.setItem("token", data.access_token);

    document.getElementById("auth-container").style.display = "none";
    document.getElementById("chat-ui").classList.remove("hidden");

    await chatModule.loadChats();
}

async function register() {
    const email = document.getElementById("register-email").value;
    const password = document.getElementById("register-password").value;

    const res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
    });

    if (!res.ok) {
        alert("Register failed");
        return;
    }

    alert("Registered! Now login.");
    showForm("login");
}

return { login, register, showForm };

})();

////////////////////////////////////////////////////////////
// CHAT
////////////////////////////////////////////////////////////

const chatModule = (() => {

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = "message " + sender;

    const content = document.createElement("div");
    content.textContent = text;
    convertLinks(content);

    msg.appendChild(content);
    document.getElementById("chat-container").appendChild(msg);

    scrollToBottom();
}

async function deleteChat() {
    const chatId = mainModule.getChatId();

    if (!chatId) {
        alert("Select chat first");
        return;
    }

    console.log("DELETE CHAT ID:", chatId);

    const res = await fetch(`/chats/${chatId}`, {
        method: "DELETE",
        headers: {
            Authorization: "Bearer " + mainModule.getToken()
        }
    });

    if (!res.ok) {
        alert("Chat already deleted or not found");

        // 🔥 ВАЖНО: обновляем список даже при ошибке
        await loadChats();
        return;
    }

    document.getElementById("chat-container").innerHTML = "";
    document.getElementById("chat-dropdown-btn").textContent = "Select chat";

    mainModule.setChatId(null);

    await loadChats();
}

async function loadChats() {
    const res = await fetch("/chats", {
        headers: {
            Authorization: "Bearer " + mainModule.getToken()
        }
    });

    const data = await res.json();

    const list = document.getElementById("chat-list");
    const btn = document.getElementById("chat-dropdown-btn");

    list.innerHTML = "";

    data.chats.forEach(c => {
        const div = document.createElement("div");
        div.textContent = c.title;

        div.onclick = () => {
            mainModule.setChatId(c.id);

            // ✅ показываем название выбранного чата
            btn.textContent = c.title;

            loadHistory();

            // закрыть dropdown
            list.classList.remove("show");
        };

        list.appendChild(div);
    });

    // ✅ если есть чаты — выбрать первый
    if (data.chats.length > 0) {
        const first = data.chats[0];

        mainModule.setChatId(first.id);
        btn.textContent = first.title;

        loadHistory();
    }
}

async function createChat() {
    const title = document.getElementById("new-chat-title").value;

    if (!title.trim()) return;

    const res = await fetch("/chats", {
        method: "POST",
        headers: {
            "Content-Type":"application/json",
            Authorization: "Bearer " + mainModule.getToken()
        },
        body: JSON.stringify({title})
    });

    const data = await res.json();

    // ✅ ОБНОВИТЬ СПИСОК
    await loadChats();

    // ✅ ВЫБРАТЬ НОВЫЙ ЧАТ
    mainModule.setChatId(data.chat_id);
    document.getElementById("chat-dropdown-btn").textContent = title;

    document.getElementById("new-chat-title").value = "";

    // ✅ очистить чат
    document.getElementById("chat-container").innerHTML = "";
}

async function loadHistory() {
    const chatId = mainModule.getChatId();
    if (!chatId) return;

    const res = await fetch(`/history/${chatId}`, {
        headers: {
            Authorization: "Bearer " + mainModule.getToken()
        }
    });

    const data = await res.json();

    const container = document.getElementById("chat-container");
    container.innerHTML = "";

    data.messages.forEach(m => {
        addMessage(m.text, m.sender);
    });
}

async function sendMessage() {
    const input = document.getElementById("message-input");
    const text = input.value;

    if (!text.trim()) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("/coach", {
        method: "POST",
        headers: {
            "Content-Type":"application/json",
            Authorization: "Bearer " + mainModule.getToken()
        },
        body: JSON.stringify({
            chat_id: mainModule.getChatId(),
            text
        })
    });

    const aiText = await res.text();
    addMessage(aiText, "ai");
}

return { loadChats, createChat, loadHistory, sendMessage, deleteChat };

})();

////////////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////////////

window.addEventListener("DOMContentLoaded", async () => {

    const token = localStorage.getItem("token");

    if (token) {
        mainModule.setToken(token);

        document.getElementById("auth-container").style.display = "none";
        document.getElementById("chat-ui").classList.remove("hidden");

        await chatModule.loadChats();
    }

    document.getElementById("message-input")
        .addEventListener("keypress", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                chatModule.sendMessage();
            }
        });

    // 🔥 ВОТ СЮДА
    const btn = document.getElementById("delete-chat-btn");

    if (btn) {
        btn.addEventListener("click", chatModule.deleteChat);
    }

});

</script>
</body>
</html>
