<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a0533">
<title>Viskara — AI Fitness Coach</title>
<link rel="icon" type="image/png" href="/static/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>
:root {
  --bg: linear-gradient(160deg,#1a0533 0%,#0d1b4b 50%,#003d33 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.1);
  --border-accent: rgba(124,58,237,0.5);
  --text: #ffffff;
  --text-muted: rgba(255,255,255,0.5);
  --text-hint: rgba(255,255,255,0.25);
  --accent-green: #06d6a0;
  --accent-purple: #7c3aed;
  --danger: #f87171;
  --success: #34d399;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --tr: all 0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);background-attachment:fixed;min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;color:var(--text);background-color:#1a0533}
#app{width:420px;max-width:100%;height:100vh;max-height:820px;display:flex;flex-direction:column;overflow:hidden;position:relative;background:rgba(10,5,25,0.65);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px)}
.hidden{display:none!important}
.glow{position:absolute;border-radius:50%;filter:blur(55px);pointer-events:none;z-index:0}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;background:rgba(255,255,255,0.02)}
.header-logo{font-size:1.1rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:6px}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:0.8rem;padding:6px 12px;cursor:pointer;transition:var(--tr);font-family:inherit}
.icon-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-accent)}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;padding:11px 14px;transition:var(--tr);outline:none;width:100%}
.field input::placeholder,.field textarea::placeholder{color:var(--text-hint)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent-purple);background:rgba(124,58,237,0.08);box-shadow:0 0 0 3px rgba(124,58,237,0.12)}
.field select option{background:#1a0a33;color:white}

/* BUTTONS */
.btn-primary{width:100%;background:linear-gradient(135deg,#7c3aed,#06d6a0);border:none;border-radius:var(--radius-sm);color:white;font-size:14px;font-weight:700;font-family:inherit;padding:13px;cursor:pointer;transition:var(--tr)}
.btn-primary:hover{opacity:0.9}
.btn-primary:active{transform:scale(0.99)}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed}
.btn-secondary{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:14px;font-weight:600;font-family:inherit;padding:12px;cursor:pointer;transition:var(--tr)}
.btn-secondary:hover{background:var(--surface-hover);color:var(--text)}
.err{color:var(--danger);font-size:12px;min-height:16px;text-align:center}
.ok{color:var(--success);font-size:12px;min-height:16px;text-align:center}

/* AUTH */
#auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:18px;position:relative;overflow:hidden;z-index:1}
.auth-hero{text-align:center;z-index:1}
.auth-icon{width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.auth-icon svg{width:36px;height:36px}
.auth-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{color:var(--text-muted);font-size:13px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;width:100%;z-index:1;backdrop-filter:blur(10px)}
.auth-tabs{display:flex;background:rgba(0,0,0,0.25);border-radius:var(--radius-sm);padding:3px;margin-bottom:16px}
.auth-tab{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:600;font-family:inherit;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:var(--tr)}
.auth-tab.active{background:rgba(255,255,255,0.1);color:white}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-foot{color:var(--text-hint);font-size:10px;text-align:center;margin-top:6px}

/* ONBOARDING */
#onboarding-screen{flex:1;display:flex;flex-direction:column;padding:20px;gap:13px;overflow-y:auto;z-index:1}
.ob-title{font-size:1.05rem;font-weight:800;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ob-sub{color:var(--text-muted);font-size:13px;margin-top:-6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.skip-link{background:none;border:none;color:var(--text-hint);font-size:12px;cursor:pointer;text-decoration:underline;align-self:center;font-family:inherit}

/* MAIN */
#main-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:rgba(255,255,255,0.02);border-top:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:none;border:none;color:var(--text-muted);font-size:10px;font-weight:500;font-family:inherit;cursor:pointer;transition:var(--tr);position:relative}
.nav-btn.active{color:var(--accent-green)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#7c3aed,#06d6a0);border-radius:0 0 2px 2px}
.nav-icon{font-size:18px}

/* TAB */
.tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-pane{flex:1;display:none;flex-direction:column;overflow:hidden}
.tab-pane.active{display:flex}

/* CHAT */
.chat-toolbar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);align-items:center;background:rgba(255,255,255,0.02);flex-shrink:0}
#chat-list-wrapper{flex:1;position:relative}
#chat-dropdown-btn{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:var(--tr)}
#chat-dropdown-btn:hover{border-color:var(--border-accent)}
#chat-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#12062a;border:1px solid var(--border);border-radius:var(--radius-sm);max-height:0;overflow:hidden;opacity:0;transition:all 0.2s ease;z-index:50}
#chat-list.show{max-height:200px;overflow-y:auto;opacity:1}
#chat-list div{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center;transition:var(--tr)}
#chat-list div:hover{background:var(--surface);color:var(--text)}
.cdel{color:var(--danger);font-size:11px;padding:2px 6px;border-radius:4px}
.cdel:hover{background:rgba(248,113,113,0.1)}
.new-chat-row{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#new-chat-title{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:8px 12px;outline:none;transition:var(--tr)}
#new-chat-title::placeholder{color:var(--text-hint)}
#new-chat-title:focus{border-color:var(--accent-purple)}
.btn-new{background:linear-gradient(135deg,#7c3aed,#06d6a0);border:none;border-radius:var(--radius-sm);color:white;font-size:12px;font-weight:700;font-family:inherit;padding:8px 14px;cursor:pointer;white-space:nowrap}
.btn-new:hover{opacity:0.9}
#chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
#chat-messages::-webkit-scrollbar{width:3px}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.message{max-width:80%;padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word;animation:fadeUp 0.2s ease}
.message.user{background:linear-gradient(135deg,rgba(124,58,237,0.65),rgba(6,214,160,0.45));color:white;align-self:flex-end;border-bottom-right-radius:4px;border:1px solid rgba(124,58,237,0.3)}
.message.ai{background:var(--surface);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.message.ai h1,.message.ai h2,.message.ai h3{margin:8px 0 4px;font-size:1em;color:var(--accent-green)}
.message.ai ul,.message.ai ol{padding-left:18px;margin:4px 0}
.message.ai li{margin:3px 0}
.message.ai strong{color:#a78bfa}
.message.ai p{margin:4px 0}
.message.ai a{color:var(--accent-green)}
.message.thinking{color:var(--text-muted);font-style:italic;font-size:13px}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:rgba(255,255,255,0.02);flex-shrink:0;align-items:flex-end}
#message-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:14px;font-family:inherit;padding:10px 16px;resize:none;max-height:80px;overflow-y:auto;outline:none;transition:var(--tr)}
#message-input::placeholder{color:var(--text-hint)}
#message-input:focus{border-color:var(--accent-purple);background:rgba(124,58,237,0.06)}
.rnd{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr)}
#send-btn{background:linear-gradient(135deg,#7c3aed,#06d6a0);color:white}
#send-btn:hover{opacity:0.9;transform:scale(1.05)}
#send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
#search-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted)}
#search-btn:hover{border-color:var(--accent-purple);color:var(--text)}
#search-btn:disabled{opacity:0.4;cursor:not-allowed}
#checkin-btn{background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.25);color:var(--success)}
#checkin-btn:hover{background:rgba(52,211,153,0.22)}

/* PLAN */
#pane-plan .inner{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
.pane-title{font-size:1rem;font-weight:800;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pane-sub{color:var(--text-muted);font-size:13px;margin-top:-6px}
.plan-cards{display:flex;flex-direction:column;gap:8px}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;transition:var(--tr)}
.plan-card:hover{border-color:var(--border-accent)}
.day-badge{font-size:10px;font-weight:700;color:var(--accent-green);background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.2);border-radius:6px;padding:4px 8px;white-space:nowrap;flex-shrink:0}
.day-badge.rest{color:var(--text-muted);background:rgba(255,255,255,0.04);border-color:var(--border)}
.day-title{font-size:13px;font-weight:600;color:var(--text)}
.plan-status{color:var(--text-muted);font-size:13px;text-align:center;padding:16px}

/* LOG */
#pane-log .inner{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
.log-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.log-hist{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.log-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;transition:var(--tr)}
.log-card:hover{border-color:var(--border-accent)}
.log-name{font-size:13px;font-weight:600;color:var(--text)}
.log-meta{font-size:11px;color:var(--text-muted);margin-top:2px}

/* PROFILE */
#pane-profile .inner{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
.prof-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06d6a0);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 6px}
.prof-email{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:10px}

/* CHECK-IN MODAL */
#checkin-modal{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:flex-end;z-index:100;backdrop-filter:blur(6px)}
#checkin-modal.show{display:flex}
.modal-sheet{width:100%;background:#12062a;border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px;display:flex;flex-direction:column;gap:16px;animation:slideUp 0.28s ease}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:-8px auto 4px}
.modal-title{font-size:1rem;font-weight:800;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-sub{color:var(--text-muted);font-size:13px;margin-top:-10px}
.sl-row{display:flex;flex-direction:column;gap:8px}
.sl-head{display:flex;justify-content:space-between;align-items:center}
.sl-label{font-size:13px;font-weight:600;color:var(--text)}
.sl-val{font-size:18px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:28px;text-align:right}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06d6a0);cursor:pointer;border:2px solid rgba(255,255,255,0.25)}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:14px;font-weight:600;font-family:inherit;padding:12px;cursor:pointer;transition:var(--tr)}
.btn-cancel:hover{background:var(--surface-hover);color:var(--text)}
.btn-submit{flex:2;background:linear-gradient(135deg,#7c3aed,#06d6a0);border:none;border-radius:var(--radius-sm);color:white;font-size:14px;font-weight:700;font-family:inherit;padding:12px;cursor:pointer}
.btn-submit:hover{opacity:0.9}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="glow" style="width:200px;height:200px;background:rgba(124,58,237,0.14);top:-60px;left:-60px"></div>
  <div class="glow" style="width:180px;height:180px;background:rgba(6,214,160,0.09);bottom:-40px;right:-40px"></div>

  <header class="header">
    <div class="header-logo">Viskara</div>
    <div class="header-actions">

      <button class="icon-btn" onclick="auth.logout()">Logout</button>
    </div>
  </header>

  <!-- AUTH -->
  <div id="auth-screen">
    <div class="auth-hero">
      <div class="auth-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bolt" x1="9" y1="4" x2="27" y2="32" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#06d6a0"/>
            </linearGradient>
          </defs>
          <path d="M21 4L9 20h9l-3 12L27 16h-9L21 4z" fill="url(#bolt)"/>
        </svg>
    </div>
      <div class="auth-title">Viskara</div>
      <div class="auth-sub">Your AI-powered home fitness coach</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="auth.showForm('login')">Login</button>
        <button class="auth-tab" id="tab-reg" onclick="auth.showForm('register')">Register</button>
      </div>
      <div class="auth-form" id="form-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="login-pw" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="auth.login()">Sign in →</button>
        <div class="err" id="login-err"></div>
      </div>
      <div class="auth-form hidden" id="form-reg">
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="reg-pw" placeholder="Min 6 characters"></div>
        <button class="btn-primary" onclick="auth.register()">Create account →</button>
        <div class="err" id="reg-err"></div>
      </div>
      <div class="auth-foot">No gym · No equipment · Free to try</div>
    </div>
  </div>

  <!-- ONBOARDING -->
  <div id="onboarding-screen" class="hidden">
    <div class="ob-title">Set up your profile 🎯</div>
    <div class="ob-sub">Helps the AI personalise every workout for you.</div>
    <div class="field"><label>Goal</label>
      <select id="ob-goal"><option value="fat_loss">Fat loss</option><option value="strength">Build strength</option><option value="general">General fitness</option></select>
    </div>
    <div class="field"><label>Level</label>
      <select id="ob-level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
    </div>
    <div class="form-row">
      <div class="field"><label>Height (cm)</label><input type="number" id="ob-h" placeholder="175"></div>
      <div class="field"><label>Weight (kg)</label><input type="number" id="ob-w" placeholder="70"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Age</label><input type="number" id="ob-age" placeholder="25"></div>
      <div class="field"><label>Days/week</label><input type="number" id="ob-days" placeholder="3" min="1" max="7"></div>
    </div>
    <div class="field"><label>Injuries / limitations</label><input type="text" id="ob-lim" placeholder="e.g. bad knee"></div>
    <button class="btn-primary" onclick="profile.saveOb()">Start training →</button>
    <button class="skip-link" onclick="profile.skip()">Skip for now</button>
    <div class="err" id="ob-err"></div>
  </div>

  <!-- MAIN -->
  <div id="main-screen" class="hidden">
    <div class="tab-content">

      <!-- CHAT -->
      <!-- CHAT -->
      <div class="tab-pane active" id="pane-chat">
        <div id="goal-bar" style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(124,58,237,0.1);border-bottom:1px solid rgba(124,58,237,0.2);font-size:12px;color:rgba(255,255,255,0.7);flex-shrink:0;">
          <span>🎯</span>
          <span id="goal-text">Loading...</span>
        </div>
        <div class="chat-toolbar">
          <div id="chat-list-wrapper">
            <div id="chat-dropdown-btn" onclick="chatUI.toggleList()">
              <span id="chat-title">Select chat</span><span>▾</span>
            </div>
            <div id="chat-list"></div>
          </div>
        </div>
        <div class="new-chat-row">
          <button class="btn-new" style="width:100%" onclick="chatUI.createChat()">+ New chat</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <textarea id="message-input" placeholder="Ask your coach..." rows="1"></textarea>
          <button class="rnd" id="checkin-btn" onclick="checkin.open()" title="Check-in">⭐</button>
          <button class="rnd" id="send-btn" onclick="chatUI.send(false)">➤</button>
        </div>
      </div>






      <!-- PROFILE -->
      <div class="tab-pane" id="pane-profile">
        <div class="inner">
          <div class="prof-avatar">🏃</div>
          <div class="prof-email" id="prof-email"></div>
          <div class="field"><label>Goal</label>
            <select id="p-goal"><option value="fat_loss">Fat loss</option><option value="strength">Build strength</option><option value="general">General fitness</option></select>
          </div>
          <div class="field"><label>Level</label>
            <select id="p-level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
          </div>
          <div class="form-row">
            <div class="field"><label>Height (cm)</label><input type="number" id="p-h" placeholder="175"></div>
            <div class="field"><label>Weight (kg)</label><input type="number" id="p-w" placeholder="70"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Age</label><input type="number" id="p-age" placeholder="25"></div>
            <div class="field"><label>Days/week</label><input type="number" id="p-days" placeholder="3"></div>
          </div>
          <div class="field"><label>Limitations</label><input type="text" id="p-lim" placeholder="e.g. bad knee"></div>
          <button class="btn-primary" onclick="profile.save()">Save profile</button>
          <div class="ok" id="prof-ok"></div>
        </div>
      </div>

    </div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-pane="pane-chat" onclick="nav.go('pane-chat',this)">
        <span class="nav-icon">💬</span>Chat
      </button>
      <button class="nav-btn" data-pane="pane-profile" onclick="nav.go('pane-profile',this)">
        <span class="nav-icon">👤</span>Profile
      </button>
    </nav>
  </div>

  <!-- CHECK-IN MODAL -->
  <div id="checkin-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Daily check-in ⭐</div>
      <div class="modal-sub">How are you feeling today?</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-label">Energy</span><span class="sl-val" id="v-energy">5</span></div>
        <input type="range" min="1" max="10" value="5" id="sl-energy" oninput="document.getElementById('v-energy').textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-label">Muscle soreness</span><span class="sl-val" id="v-soreness">3</span></div>
        <input type="range" min="1" max="10" value="3" id="sl-soreness" oninput="document.getElementById('v-soreness').textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-label">Mood</span><span class="sl-val" id="v-mood">7</span></div>
        <input type="range" min="1" max="10" value="7" id="sl-mood" oninput="document.getElementById('v-mood').textContent=this.value">
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="checkin.close()">Cancel</button>
        <button class="btn-submit" onclick="checkin.submit()">Get today's plan →</button>
      </div>
    </div>
  </div>
</div>

<script>
marked.setOptions({gfm:true,breaks:true});
const state={token:null,email:'',chatId:null,loading:false};
const api={
  async call(m,p,b){
    const h={'Content-Type':'application/json'};
    if(state.token)h['Authorization']='Bearer '+state.token;
    const r=await fetch(p,{method:m,headers:h,body:b?JSON.stringify(b):undefined});
    if(r.status===401){auth.logout();throw new Error('401');}
    return r;
  },
  get:p=>api.call('GET',p),
  post:(p,b)=>api.call('POST',p,b),
  del:p=>api.call('DELETE',p)
};
function show(id){['auth-screen','onboarding-screen','main-screen'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
const auth={
  showForm(t){
    document.getElementById('form-login').classList.toggle('hidden',t!=='login');
    document.getElementById('form-reg').classList.toggle('hidden',t!=='register');
    document.getElementById('tab-login').classList.toggle('active',t==='login');
    document.getElementById('tab-reg').classList.toggle('active',t==='register');
  },
  async login(){
    const email=document.getElementById('login-email').value.trim();
    const pw=document.getElementById('login-pw').value;
    const err=document.getElementById('login-err');
    err.textContent='';
    if(!email||!pw){err.textContent='Please fill in all fields.';return;}
    try{
      const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
      if(!r.ok){err.textContent='Invalid email or password.';return;}
      const d=await r.json();
      state.token=d.access_token;state.email=email;
      localStorage.setItem('token',d.access_token);localStorage.setItem('email',email);
      await auth.afterLogin();
    }catch(e){err.textContent='Connection error. Try again.';}
  },
  async register(){
    const email=document.getElementById('reg-email').value.trim();
    const pw=document.getElementById('reg-pw').value;
    const err=document.getElementById('reg-err');
    err.textContent='';
    if(!email||!pw){err.textContent='Please fill in all fields.';return;}
    if(pw.length<6){err.textContent='Password must be at least 6 characters.';return;}
    try{
      const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
      if(!r.ok){err.textContent='Email already registered.';return;}
      err.style.color='var(--success)';err.textContent='Account created! Please login.';
      auth.showForm('login');
    }catch(e){err.textContent='Connection error. Try again.';}
  },
  async afterLogin(){
    const r=await api.get('/profile');
    const d=await r.json();
    if(!d.profile){show('onboarding-screen');}
    else{profile.fill(d.profile);auth.enter();}
  },
  async enter(){
    show('main-screen');
    document.getElementById('prof-email').textContent=state.email;
    logUI.fetchLogs();
    await chatUI.fetchChats();
    const r=await api.post('/chats/auto',{});
    const d=await r.json();
    if(d.chat_id) await chatUI.selectChat(d.chat_id, d.title);
    await goalBar.load();
  },
  logout(){
    state.token=null;state.email='';state.chatId=null;
    localStorage.removeItem('token');localStorage.removeItem('email');
    document.getElementById('chat-messages').innerHTML='';
    document.getElementById('chat-title').textContent='Select chat';
    show('auth-screen');
  }
};
const profile={
  async saveOb(){
    const err=document.getElementById('ob-err');err.textContent='';
    const h=parseInt(document.getElementById('ob-h').value);
    const w=parseFloat(document.getElementById('ob-w').value);
    if(!h||!w){err.textContent='Height and weight are required.';return;}
    try{
      await api.post('/profile',{goal:document.getElementById('ob-goal').value,level:document.getElementById('ob-level').value,height:h,weight:w,age:parseInt(document.getElementById('ob-age').value)||null,days_per_week:parseInt(document.getElementById('ob-days').value)||null,limitations:document.getElementById('ob-lim').value||null});
      auth.enter();
    }catch(e){err.textContent='Could not save. Try again.';}
  },
  skip(){auth.enter();},
  fill(p){
    if(!p)return;
    [['goal','ob-goal','p-goal'],['level','ob-level','p-level']].forEach(([k,a,b])=>{
      if(document.getElementById(a))document.getElementById(a).value=p[k]||'';
      if(document.getElementById(b))document.getElementById(b).value=p[k]||'';
    });
    [['height','ob-h','p-h'],['weight','ob-w','p-w'],['age','ob-age','p-age'],['days_per_week','ob-days','p-days'],['limitations','ob-lim','p-lim']].forEach(([k,a,b])=>{
      if(document.getElementById(a))document.getElementById(a).value=p[k]||'';
      if(document.getElementById(b))document.getElementById(b).value=p[k]||'';
    });
  },
  async save(){
    const s=document.getElementById('prof-ok');s.textContent='';
    const h=parseInt(document.getElementById('p-h').value);
    const w=parseFloat(document.getElementById('p-w').value);
    if(!h||!w){s.style.color='var(--danger)';s.textContent='Height and weight required.';return;}
    try{
      await api.post('/profile',{goal:document.getElementById('p-goal').value,level:document.getElementById('p-level').value,height:h,weight:w,age:parseInt(document.getElementById('p-age').value)||null,days_per_week:parseInt(document.getElementById('p-days').value)||null,limitations:document.getElementById('p-lim').value||null});
      s.style.color='var(--success)';s.textContent='✓ Profile saved!';
      setTimeout(()=>s.textContent='',3000);
    }catch(e){s.style.color='var(--danger)';s.textContent='Save failed.';}
  }
};
const nav={
  go(paneId,btn){
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(paneId).classList.add('active');
    btn.classList.add('active');
    if(paneId==='pane-log')logUI.fetchLogs();
  }
};
const chatUI={
  toggleList(){document.getElementById('chat-list').classList.toggle('show');},
  addMsg(text,sender){
    const c=document.getElementById('chat-messages');
    const d=document.createElement('div');
    d.className='message '+sender;
    if(sender==='ai')d.innerHTML=marked.parse(text);
    else d.textContent=text;
    c.appendChild(d);c.scrollTop=c.scrollHeight;return d;
  },
  addThinking(text){
    const c=document.getElementById('chat-messages');
    const d=document.createElement('div');
    d.className='message ai thinking';d.textContent=text;
    c.appendChild(d);c.scrollTop=c.scrollHeight;return d;
  },
  setLoading(v){
    state.loading=v;
    document.getElementById('send-btn').disabled=v;
  },
  async send(isSearch){
    if(state.loading)return;
    const inp=document.getElementById('message-input');
    const text=inp.value.trim();
    if(!text)return;
    if(!state.chatId){chatUI.addMsg('Please select or create a chat first.','ai');return;}
    inp.value='';
    chatUI.addMsg(text,'user');
    const t=chatUI.addThinking(isSearch?'🔎 Searching the web...':'🤖 Thinking...');
    chatUI.setLoading(true);
    try{
      const r=await api.post(isSearch?'/search':'/coach',{chat_id:state.chatId,text});
      t.remove();
      if(!r.ok){chatUI.addMsg('Something went wrong. Please try again.','ai');return;}
      chatUI.addMsg(await r.text(),'ai');
    }catch(e){t.remove();chatUI.addMsg('Connection error. Please try again.','ai');}
    finally{chatUI.setLoading(false);}
  },
  async fetchChats(){
    const r=await api.get('/chats');
    const d=await r.json();
    const el=document.getElementById('chat-list');
    el.innerHTML='';
    d.chats.forEach(c=>{
      const div=document.createElement('div');
      div.innerHTML=`<span>${c.title}</span><span class="cdel" onclick="chatUI.delChat(${c.id},event)">✕</span>`;
      div.onclick=()=>chatUI.selectChat(c.id,c.title);
      el.appendChild(div);
    });
  },
  async selectChat(id,title){
    console.log('selectChat called:', id, title);
    state.chatId=id;
    document.getElementById('chat-title').textContent=title;
    document.getElementById('chat-list').classList.remove('show');
    document.getElementById('chat-messages').innerHTML='';
    const r=await api.get('/history/'+id);
    const d=await r.json();
    d.messages.forEach(m=>chatUI.addMsg(m.text,m.sender));
  },
  async createChat(){
    const r=await api.post('/chats',{title:'New Chat'});
    const d=await r.json();
    await chatUI.fetchChats();
    chatUI.selectChat(d.chat_id,'New Chat');
  },
  async delChat(id,e){
    e.stopPropagation();
    if(!confirm('Delete this chat?'))return;
    await api.del('/chats/'+id);
    if(state.chatId===id){state.chatId=null;document.getElementById('chat-title').textContent='Select chat';document.getElementById('chat-messages').innerHTML='';}
    chatUI.fetchChats();
  }
};
const checkin={
  open(){
    if(!state.chatId){chatUI.addMsg('Please select a chat first.','ai');return;}
    document.getElementById('checkin-modal').classList.add('show');
  },
  close(){document.getElementById('checkin-modal').classList.remove('show');},
  async submit(){
    const energy=parseInt(document.getElementById('sl-energy').value);
    const soreness=parseInt(document.getElementById('sl-soreness').value);
    const mood=parseInt(document.getElementById('sl-mood').value);
    checkin.close();
    nav.go('pane-chat',document.querySelector('[data-pane="pane-chat"]'));
    chatUI.addMsg(`Daily check-in — Energy: ${energy}/10, Soreness: ${soreness}/10, Mood: ${mood}/10`,'user');
    const t=chatUI.addThinking('🤖 Analysing your check-in...');
    chatUI.setLoading(true);
    try{
      const r=await api.post('/checkin',{chat_id:state.chatId,energy,soreness,mood});
      t.remove();chatUI.addMsg(await r.text(),'ai');
    }catch(e){t.remove();chatUI.addMsg('Check-in failed. Please try again.','ai');}
    finally{chatUI.setLoading(false);}
  }
};
const logUI={
  async save(){
    const ex=document.getElementById('log-ex').value.trim();
    const msg=document.getElementById('log-msg');msg.textContent='';
    if(!ex){msg.style.color='var(--danger)';msg.textContent='Exercise name is required.';return;}
    try{
      await api.post('/log',{exercise:ex,sets:parseInt(document.getElementById('log-sets').value)||null,reps:parseInt(document.getElementById('log-reps').value)||null,duration_minutes:parseInt(document.getElementById('log-dur').value)||null,notes:document.getElementById('log-notes').value||null});
      ['log-ex','log-sets','log-reps','log-dur','log-notes'].forEach(id=>document.getElementById(id).value='');
      msg.style.color='var(--success)';msg.textContent='✓ Workout logged!';
      setTimeout(()=>msg.textContent='',2500);
      logUI.fetchLogs();
    }catch(e){msg.style.color='var(--danger)';msg.textContent='Failed. Try again.';}
  },
  async fetchLogs(){
    try{
      const r=await api.get('/log');
      const d=await r.json();
      const c=document.getElementById('log-hist');c.innerHTML='';
      if(!d.logs.length){c.innerHTML='<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No workouts logged yet.</div>';return;}
      d.logs.forEach(l=>{
        const card=document.createElement('div');card.className='log-card';
        const meta=[l.sets?`${l.sets} sets`:'',l.reps?`${l.reps} reps`:'',l.duration_minutes?`${l.duration_minutes} min`:''].filter(Boolean).join(' · ');
        card.innerHTML=`<div class="log-name">${l.exercise}</div><div class="log-meta">${meta?meta+' · ':''}${l.date}</div>`;
        c.appendChild(card);
      });
    }catch(e){}
  }
};
const planUI={
  async generate(){
    if(!state.chatId){document.getElementById('plan-status').textContent='Please open Chat and select a chat first.';return;}
    const btn=document.getElementById('plan-btn');
    const status=document.getElementById('plan-status');
    const cards=document.getElementById('plan-cards');
    btn.disabled=true;btn.textContent='Generating...';
    status.textContent='Creating your personalised plan...';cards.innerHTML='';
    try{
      const r=await api.post('/coach',{chat_id:state.chatId,text:'Please create a strict 7-day weekly workout plan based EXACTLY on my saved profile. IMPORTANT: Use EXACTLY the number of training days I specified (days_per_week). The remaining days must be Rest day. Format each day as: **Day N (Mon/Tue/...):** [Rest day OR Workout focus] — brief description.'});
      const text=await r.text();
      status.textContent='';
      planUI.render(text);
    }catch(e){status.textContent='Could not generate plan. Try again.';}
    finally{btn.disabled=false;btn.textContent='✨ Regenerate plan';}
  },
  render(text){
    const cards=document.getElementById('plan-cards');cards.innerHTML='';
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const lines=text.split('\n').filter(l=>l.trim());
    let idx=0;
    lines.forEach(line=>{
      if(/day\s*\d|monday|tuesday|wednesday|thursday|friday|saturday|sunday/i.test(line)&&idx<7){
        const isRest=/rest/i.test(line);
        const clean=line.replace(/\*\*/g,'').replace(/^[-#*\s]+/,'').trim();
        const desc=clean.split(':').slice(1).join(':').trim()||clean;
        const card=document.createElement('div');card.className='plan-card';
        card.innerHTML=`<div class="day-badge${isRest?' rest':''}">${days[idx]}</div><div><div class="day-title">${isRest?'Rest day':desc||clean}</div></div>`;
        cards.appendChild(card);idx++;
      }
    });
    if(idx===0)cards.innerHTML=`<div class="plan-status" style="text-align:left">${marked.parse(text)}</div>`;
  }
};
function toggleTheme(){
  const btn=document.getElementById('theme-btn');
  btn.textContent=btn.textContent==='🌙'?'☀️':'🌙';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&document.getElementById('message-input')===document.activeElement){
    e.preventDefault();chatUI.send(false);
  }
});
document.addEventListener('click',e=>{
  if(!document.getElementById('chat-list-wrapper').contains(e.target))
    document.getElementById('chat-list').classList.remove('show');
});

const goalBar = {
  async load(){
    try{
      const r=await api.get('/profile');
      const d=await r.json();
      if(!d.profile){
        document.getElementById('goal-text').textContent='Set up your profile to get a personalised plan';
        return;
      }
      const gm={fat_loss:'Fat loss',strength:'Build strength',general:'General fitness'};
      const goal=gm[d.profile.goal]||d.profile.goal;
      const days=d.profile.days_per_week||3;
      const level=d.profile.level||'beginner';
      document.getElementById('goal-text').textContent=`🎯 ${goal} · ${level} · ${days} days/week`;
    }catch(e){}
  }
};

window.addEventListener('DOMContentLoaded',async()=>{
  const token=localStorage.getItem('token');
  const email=localStorage.getItem('email');
  if(token){
    state.token=token;state.email=email||'';
    try{await auth.afterLogin();}catch(e){auth.logout();}
  }
});
</script>
</body>
</html>
