<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fitness App MVP</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .tab { display: none; }
        input, select, button { display: block; margin: 5px 0; padding: 5px; }
        #workoutContainer div { margin: 3px 0; }
    </style>
</head>
<body>

<!-- REGISTRATION -->
<div id="registerTab" class="tab">
    <h2>Register</h2>
    <input id="registerEmail" placeholder="Email">
    <input id="registerPassword" type="password" placeholder="Password">
    <select id="goal">
        <option value="fat_loss">Похудение</option>
        <option value="strength">Сила / Тонус</option>
        <option value="maintenance">Поддержание формы</option>
    </select>
    <input id="height" type="number" placeholder="Рост (см)">
    <input id="weight" type="number" placeholder="Вес (кг)">
    <input id="health_issues" placeholder="Есть ограничения по здоровью (если есть)">
    <button onclick="register()">Register</button>
    <div id="registerMessage"></div>
    <button onclick="showTab('login')">Go to Login</button>
</div>

<!-- LOGIN -->
<div id="loginTab" class="tab">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="loginMessage"></div>
    <button onclick="showTab('register')">Go to Register</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="tab">
    <h2>Fitness App</h2>
    <div>
        <h3>Daily Check-in</h3>
        <input id="energy" type="number" placeholder="Energy (1-10)">
        <input id="soreness" type="number" placeholder="Soreness (1-10)">
        <input id="mood" type="number" placeholder="Mood (1-10)">
        <button onclick="submitCheckin()">Submit Check-in</button>
        <div id="checkinMessage"></div>
    </div>
    <div>
        <h3>Workout</h3>
        <button onclick="generateWorkout()">Generate Workout</button>
        <div id="workoutContainer"></div>
        <button onclick="completeWorkout()">Complete Workout</button>
        <div id="workoutMessage"></div>
    </div>
    <div>
        <h3>Status</h3>
        <div id="statusContainer"></div>
        <button onclick="getStatus()">Refresh Status</button>
    </div>
    <button onclick="logout()">Logout</button>
</div>

<script>
let token = null;

// TAB SWITCHING
function showTab(tab) {
    document.getElementById("registerTab").style.display = tab === "register" ? "block" : "none";
    document.getElementById("loginTab").style.display = tab === "login" ? "block" : "none";
    document.getElementById("mainApp").style.display = tab === "app" ? "block" : "none";
}

// INIT: show register first
showTab("register");

// REGISTER
async function register() {
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;
    const goal = document.getElementById("goal").value;
    const health_issues = document.getElementById("health_issues").value;
    const height = parseInt(document.getElementById("height").value) || null;
    const weight = parseInt(document.getElementById("weight").value) || null;

    const res = await fetch("/register", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password, goal, health_issues, height, weight})
    });
    const data = await res.json();
    if(res.ok){
        document.getElementById("registerMessage").innerText = "Registered! Please login.";
        showTab("login");
    } else {
        document.getElementById("registerMessage").innerText = data.detail || "Error";
    }
}

// LOGIN
async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const res = await fetch("/login", {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
    });
    const data = await res.json();
    if(res.ok){
        token = data.access_token;
        showTab("app");
        getStatus();
    } else {
        document.getElementById("loginMessage").innerText = data.detail || "Error";
    }
}

// CHECKIN
async function submitCheckin() {
    const energy = parseInt(document.getElementById("energy").value);
    const soreness = parseInt(document.getElementById("soreness").value);
    const mood = parseInt(document.getElementById("mood").value);
    const res = await fetch("/checkin", {
        method: "POST",
        headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
        body: JSON.stringify({energy, soreness, mood})
    });
    const data = await res.json();
    document.getElementById("checkinMessage").innerText = data.status;
}

// GENERATE WORKOUT
async function generateWorkout() {
    const res = await fetch("/workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    const container = document.getElementById("workoutContainer");
    container.innerHTML = "";
    data.workout.forEach(w => {
        container.innerHTML += `<div class="workout">${w.name} ${w.reps || w.duration || ""}</div>`;
    });
}

// COMPLETE WORKOUT
async function completeWorkout() {
    const res = await fetch("/complete-workout", {
        method: "POST",
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("workoutMessage").innerText = data.status === "ok" ? `Workout done! Streak: ${data.streak}` : "Already completed today";
    getStatus();
}

// GET STATUS
async function getStatus() {
    const res = await fetch("/status", {
        headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    document.getElementById("statusContainer").innerText = `Streak: ${data.streak}, Total workouts: ${data.total}`;
}

// LOGOUT
function logout() {
    token = null;
    showTab("login");
}
</script>

</body>
</html>
