<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentra Coach</title>
<style>
:root {
  --bg-main:#f5f9ff; --bg-chat:#e8f0ff;
  --bg-message-user:#5a8cff; --bg-message-ai:#ffffff;
  --accent:#5a8cff; --accent-dark:#3b6ae0;
  --text-main:#1a2b4c; --text-secondary:#5a6f8c;
  --border:rgba(90,140,255,0.15); --shadow-sm:0 4px 12px rgba(90,140,255,0.08);
  --shadow-md:0 8px 24px rgba(90,140,255,0.12); --radius:14px;
  --transition:all 0.28s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg-main:#0f172a; --bg-chat:#1e293b;
  --bg-message-user:#1e40af; --bg-message-ai:#1e293b;
  --text-main:#e2e8f0; --text-secondary:#94a3b8;
  --border:rgba(90,140,255,0.25); --shadow-sm:0 4px 12px rgba(0,0,0,0.4);
  --shadow-md:0 8px 24px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg-main);}
#app-container {
  width: 420px;
  max-width: 100%;
  height: 700px;              /* 🔥 фикс вместо min-height */
  max-height: 90vh;           /* 🔥 чтобы не вылезал на маленьких экранах */
  background: var(--bg-main);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  overflow: hidden;           /* 🔥 КЛЮЧЕВОЕ */
  border: 1px solid var(--border);
}
.hidden{display:none !important;}
.app-header{background:var(--bg-chat);color:var(--text-main);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:1.25rem;font-weight:600;border-bottom:1px solid var(--border);}
.logout-text{cursor:pointer;font-size:0.85em;padding:6px 10px;border-radius:8px;color:var(--text-secondary);transition:var(--transition);}
.logout-text:hover{background:rgba(90,140,255,0.08);color:var(--text-main);}
#auth-container{padding:20px;display:flex;flex-direction:column;align-items:center;}
.auth-tabs{display:flex;width:100%;border-radius:var(--radius);overflow:hidden;background:rgba(90,140,255,0.08);box-shadow:var(--shadow-sm);margin-bottom:18px;}
.auth-tabs button{flex:1;padding:14px;border:none;background:transparent;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:var(--transition);}
.auth-tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:white;}
.auth-form{display:flex;flex-direction:column;gap:14px;width:100%;}
.auth-form input{padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-chat);color:var(--text-main);transition:var(--transition);}
.auth-form input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(90,140,255,0.15);}
.auth-form button{padding:12px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:white;font-weight:600;cursor:pointer;transition:var(--transition);}
.auth-form button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(90,140,255,0.25);}
#chat-container {
  flex: 1;
  padding: 12px 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg-chat);

  min-height: 0;

  scroll-behavior: smooth; /* 🔥 плавный скролл */
}
#chat-ui {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}
.message{max-width:75%;padding:14px 18px;border-radius:18px;line-height:1.6;font-size:14.5px;border:1px solid var(--border);box-shadow:var(--shadow-sm);word-break:break-word;overflow-wrap:anywhere;animation:fadeIn 0.25s ease;}
.user{background:var(--bg-message-user);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.ai{background:var(--bg-message-ai);color:var(--text-main);align-self:flex-start;border-bottom-left-radius:4px;}
#input-container {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-main);

  position: sticky;   /* 🔥 держится снизу */
  bottom: 0;
}
#message-input{flex:1;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-chat);}
#message-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(90,140,255,0.15);}
#input-container button{padding:0 18px;min-width:90px;height:44px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
#input-container button:hover{background:var(--accent-dark);transform:scale(1.05);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script>
marked.setOptions({gfm:true,breaks:true,mangle:false,headerIds:false});
</script>
</head>
<body>
<div id="app-container">
<header class="app-header">
    <div class="app-title">Mentra Coach</div>
    <span class="logout-text" id="btn-logout" onclick="mainModule.logout()">Logout</span>
</header>

<!-- AUTH -->
<div id="auth-container">
    <div class="auth-tabs">
        <button id="login-tab" class="active" onclick="authModule.showForm('login')">Login</button>
        <button id="register-tab" onclick="authModule.showForm('register')">Register</button>
    </div>
    <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="button" onclick="authModule.login()">Enter</button>
    </form>
    <form id="register-form" class="auth-form hidden">
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Password" required>
        <button type="button" onclick="authModule.register()">Register</button>
    </form>
</div>

<!-- CHAT UI -->
<div id="chat-ui" class="hidden">
    <div id="chat-container"></div>
    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="chatModule.sendMessage()">Send</button>
        <button id="start-trial">Start Trial 💪</button>
        <button id="submit-feedback">Submit Feedback 📝</button>
    </div>
</div>
</div>

<script>
////////////////////////////////////////////////////////////
// HELPERS
////////////////////////////////////////////////////////////
let userScrolledUp = false;

function isNearBottom() {
    const c = document.getElementById("chat-container");
    return c.scrollHeight - c.scrollTop - c.clientHeight < 80;
}

function scrollToBottom(force = false) {
    const c = document.getElementById("chat-container");
    if (!c) return;

    if (force || !userScrolledUp) {
        c.scrollTop = c.scrollHeight;
    }
}
async function typeWriterEffect(el,text,delay=8){el.textContent="";for(let i=0;i<text.length;i++){el.textContent+=text.charAt(i);if(i % 20 === 0) scrollToBottom();await new Promise(r=>setTimeout(r,delay));}scrollToBottom();convertLinks(el);}
function convertLinks(el){const text=el.textContent;const urlRegex=/(https?:\/\/[^\s]+)/g;el.innerHTML="";let lastIndex=0,match;while((match=urlRegex.exec(text))!==null){const before=text.substring(lastIndex,match.index);el.appendChild(document.createTextNode(before));const link=document.createElement("a");link.href=match[0];link.textContent=match[0];link.target="_blank";link.rel="noopener noreferrer";el.appendChild(link);lastIndex=urlRegex.lastIndex;}const after=text.substring(lastIndex);el.appendChild(document.createTextNode(after));}

////////////////////////////////////////////////////////////
// MAIN MODULE
////////////////////////////////////////////////////////////
const mainModule=(()=>{let token=null;let chat_id=null;
return{
    setToken:t=>token=t,
    getToken:()=>token,
    setChatId:id=>chat_id=id,
    getChatId:()=>chat_id,
    logout:()=>{token=null;chat_id=null;localStorage.removeItem("token");document.getElementById("chat-container").innerHTML="";document.getElementById("chat-ui").classList.add("hidden");document.getElementById("auth-container").style.display="block";}
}})();

////////////////////////////////////////////////////////////
// AUTH MODULE
////////////////////////////////////////////////////////////
const authModule=(()=>{function showForm(type){document.getElementById("login-form").classList.toggle("hidden",type!=="login");document.getElementById("register-form").classList.toggle("hidden",type!=="register");document.getElementById("login-tab").classList.toggle("active",type==="login");document.getElementById("register-tab").classList.toggle("active",type==="register");}
async function login(){
    const email=document.getElementById("login-email").value;
    const password=document.getElementById("login-password").value;

    const res=await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    });

    if(!res.ok){
        alert("Login failed");
        return;
    }

    const data=await res.json();

    mainModule.setToken(data.access_token);
    localStorage.setItem("token",data.access_token);

    // ✅ создаем чат
    const chatRes = await fetch("/chats", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + data.access_token
        },
        body: JSON.stringify({ title: "Main chat" })
    });

    const chatData = await chatRes.json();
    mainModule.setChatId(chatData.chat_id);
    localStorage.setItem("chat_id", chatData.chat_id);

    document.getElementById("auth-container").style.display="none";
    document.getElementById("chat-ui").classList.remove("hidden");

    await chatModule.loadHistory();
}
async function register(){const email=document.getElementById("register-email").value;const password=document.getElementById("register-password").value;const res=await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});if(!res.ok){alert("Registration failed");return;}alert("Registered! Now login.");showForm("login");}
return {login,register,showForm};})();

const chatModule = (() => {

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = "message " + sender;

    const content = document.createElement("div");

    if (sender === "ai") {
        typeWriterEffect(content, text);
    } else {
        content.textContent = text;
        convertLinks(content);
    }

    msg.appendChild(content);
    document.getElementById("chat-container").appendChild(msg);

    scrollToBottom();
}

async function loadHistory() {
    const chatId = mainModule.getChatId();

    if (!chatId) return;

    const res = await fetch(`/history/${chatId}`, {
        headers: {
            "Authorization": "Bearer " + mainModule.getToken()
        }
    });

    if (!res.ok) return;

    const data = await res.json();

    const container = document.getElementById("chat-container");
    container.innerHTML = "";

    data.messages.forEach(m => {
        addMessage(m.text, m.sender);
    });
}

async function sendMessage(customText = null) {
    const input = document.getElementById("message-input");
    const text = customText || input.value;

    if (!text.trim()) return;

    addMessage(text, "user");
    if (!customText) input.value = "";

    // ✅ ПОКАЗЫВАЕМ LOADING
    const loadingMsg = document.createElement("div");
    loadingMsg.className = "message ai";
    loadingMsg.textContent = "Thinking...";
    document.getElementById("chat-container").appendChild(loadingMsg);
    scrollToBottom();

    try {
        const res = await fetch("/coach", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + mainModule.getToken()
            },
            body: JSON.stringify({
                chat_id: mainModule.getChatId(),
                text
            })
        });

        if (!res.ok) throw new Error(res.status);

        const aiText = await res.text();

        // ✅ УДАЛЯЕМ LOADING ПОСЛЕ ОТВЕТА
        loadingMsg.remove();

        addMessage(aiText, "ai");

    } catch (e) {
        console.error(e);

        loadingMsg.remove(); // ✅ важно

        addMessage("⚠️ Something went wrong. Try again.", "ai");
    }
}

function startTrial() {
    sendMessage("start trial");
}

function submitFeedback() {
    alert("Feedback пока не реализован в бэкенде");
}

return { sendMessage, addMessage, startTrial, submitFeedback, loadHistory };

})();

////////////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////////////
window.addEventListener("DOMContentLoaded", async () => {

    const savedToken = localStorage.getItem("token");

    if (savedToken) {
        mainModule.setToken(savedToken);

        document.getElementById("auth-container").style.display = "none";
        document.getElementById("chat-ui").classList.remove("hidden");

        const savedChatId = localStorage.getItem("chat_id");

        if (savedChatId) {
            // ✅ используем существующий чат
            mainModule.setChatId(savedChatId);
            await chatModule.loadHistory();

        } else {
            // ✅ создаём новый чат
            try {
                const chatRes = await fetch("/chats", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + savedToken
                    },
                    body: JSON.stringify({ title: "Main chat" })
                });

                if (!chatRes.ok) throw new Error("Chat creation failed");

                const chatData = await chatRes.json();

                mainModule.setChatId(chatData.chat_id);

                // сохраняем chat_id
                localStorage.setItem("chat_id", chatData.chat_id);

                await chatModule.loadHistory();

            } catch (e) {
                console.error("Chat init error:", e);
            }
        }
    }

    // ❗ ВСЕГДА вне if

    document.getElementById("start-trial")
        .addEventListener("click", chatModule.startTrial);

    document.getElementById("submit-feedback")
        .addEventListener("click", chatModule.submitFeedback);

    document.getElementById("message-input")
        .addEventListener("keypress", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                chatModule.sendMessage();
            }
        });

    const chat = document.getElementById("chat-container");

    chat.addEventListener("scroll", () => {
        userScrolledUp = !isNearBottom();
    });

    document.getElementById("message-input").focus();

});


</script>
</body>
</html>
